<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebooks - Caderno+</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/notebook.css">
</head>
<body>

    <!-- Tela de Dashboard de Materiais -->
    <div id="dashboardScreen" class="">
        <div class="dashboard-container">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="user-section">
                    <h2>Bem-vindo, <span id="userName">Ana</span>!</h2>
                </div>
                <button class="btn btn-logout" onclick="handleLogout()">Sair</button>
            </header>

            <!-- Main Content -->
            <main class="dashboard-main">
                <div class="dashboard-top-actions">
                    <h1>Meus Cadernos</h1>
                </div>

                <!-- Grid de Materiais e Cards de Exemplo -->
                <div class="materials-grid">
                    <div class="material-card" style="background: var(--primary-color);">
                        <div class="material-card-header">
                            <h3>Matemática</h3>
                            <span class="material-count">12 anotações</span>
                        </div>
                        <button class="btn btn-small" onclick="goToGallery('Matemática')">Acessar</button>
                    </div>

                    <div class="material-card" style="background: var(--primary-color);">
                        <div class="material-card-header">
                            <h3>Física</h3>
                            <span class="material-count">8 anotações</span>
                        </div>
                        <button class="btn btn-small" onclick="goToGallery('Física')">Acessar</button>
                    </div>

                    <div class="material-card" style="background: var(--primary-color);">
                        <div class="material-card-header">
                            <h3>Química</h3>
                            <span class="material-count">6 anotações</span>
                        </div>
                        <button class="btn btn-small" onclick="goToGallery('Química')">Acessar</button>
                    </div>

                    <div class="material-card" style="background: var(--primary-color);">
                        <div class="material-card-header">
                            <h3>Biologia</h3>
                            <span class="material-count">10 anotações</span>
                        </div>
                        <button class="btn btn-small" onclick="goToGallery('Biologia')">Acessar</button>
                    </div>

                    <div class="material-card material-card-add" onclick="showAddMaterialModal()">
                        <div class="material-add-content">
                            <span class="add-icon">+</span>
                            <p>Nova Matéria</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/gallery.js"></script>
    <script src="../assets/js/notebook.js"></script>
</body>
</html>
