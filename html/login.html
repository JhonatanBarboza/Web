<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Caderno+</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <!-- Tela de Login / Cadastro -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-content">
                <div class="logo-section">
                    <h1 class="logo-text">Caderno<span class="plus">+</span></h1>
                    <p class="tagline">Seu caderno inteligente</p>
                </div>
                
                <div class="form-wrapper">
                    <div class="form-tabs">
                        <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                        <button class="tab-btn" onclick="switchTab('signup')">Cadastrar</button>
                    </div>

                    <!-- Formulário de Login -->
                    <form id="loginForm" class="form-content active">
                        <div class="form-group">
                            <label for="loginEmail">E-mail</label>
                            <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Senha</label>
                            <input type="password" id="loginPassword" placeholder="Digite sua senha" required>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="handleLogin()">Entrar</button>
                    </form>

                    <!-- Formulário de Cadastro -->
                    <form id="signupForm" class="form-content">
                        <div class="form-group">
                            <label for="signupName">Nome Completo</label>
                            <input type="text" id="signupName" placeholder="Seu nome" required>
                        </div>
                        <div class="form-group">
                            <label for="signupEmail">E-mail</label>
                            <input type="email" id="signupEmail" placeholder="seu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signupPassword">Senha</label>
                            <input type="password" id="signupPassword" placeholder="Digite sua senha" required>
                        </div>
                        <div class="form-group">
                            <label for="signupConfirm">Confirme a senha</label>
                            <input type="password" id="signupConfirm" placeholder="Confirme sua senha" required>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="handleSignup()">Criar Conta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
